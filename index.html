<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Daily stretch tracker for carpal tunnel and leg exercises">

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Stretch">
  <meta name="theme-color" content="#0f0f13">

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">

  <link rel="stylesheet" href="./css/styles.css">

  <title>StretchTracker</title>
</head>
<body>
  <main id="app">
    <!-- Views are rendered here by js/ui.js -->
    <div class="splash">
      <div class="splash-logo">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="#4ade80" stroke-width="3"/>
          <circle cx="32" cy="18" r="6" fill="#4ade80"/>
          <path d="M32 26 L32 42 M22 32 L42 32 M26 42 L32 50 M38 42 L32 50" stroke="#4ade80" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="splash-text">Loading...</p>
    </div>
  </main>

  <script src="./js/data.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/notifications.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
