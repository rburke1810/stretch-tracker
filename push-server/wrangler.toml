name = "stretch-tracker-push"
main = "src/index.js"
compatibility_date = "2025-01-01"

# KV namespace for storing subscription + schedule
# After running `wrangler kv namespace create STRETCH_KV`, paste the id below
[[kv_namespaces]]
binding = "STRETCH_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Cron: run every 10 minutes to check for due notifications
[triggers]
crons = ["*/10 * * * *"]
